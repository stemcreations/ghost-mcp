# Run the same checks CI runs, locally before each commit.
# Install once with:  uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
